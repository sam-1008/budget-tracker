{% extends "base.html" %}

{% block content %}
<div class="bg-white border border-outline-variant/30 rounded-xl p-md shadow-[0_4px_12px_rgba(0,0,0,0.05)]">
    <div class="mb-md">
        <h2 class="text-2xl font-bold text-on-surface flex items-center gap-2">
            <span class="w-8 h-8 rounded-lg bg-primary/10 text-primary flex items-center justify-center">
                <span class="material-symbols-outlined text-[20px]">add_circle</span>
            </span>
            Add Transaction
        </h2>
    </div>
    <form action="/add_transaction" method="POST" class="space-y-6">
        
        <div>
            <label class="block font-label-md text-on-surface-variant mb-2">Transaction Type</label>
            <div class="grid grid-cols-2 gap-4">
                <label class="cursor-pointer">
                    <input type="radio" name="action" value="log_expense" class="peer sr-only" checked>
                    <div class="text-center py-3 rounded-lg border border-outline-variant peer-checked:bg-error-container peer-checked:text-on-error-container peer-checked:border-error peer-checked:font-bold transition-all">
                        Expense
                    </div>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="action" value="add_funds" class="peer sr-only">
                    <div class="text-center py-3 rounded-lg border border-outline-variant peer-checked:bg-secondary-container peer-checked:text-on-secondary-container peer-checked:border-secondary peer-checked:font-bold transition-all">
                        Income
                    </div>
                </label>
            </div>
        </div>

        <div>
            <label class="block font-label-md text-on-surface-variant mb-1">Category</label>
            <select name="category" required class="w-full bg-surface border border-outline-variant rounded-lg p-3 focus:outline-none focus:border-primary transition-all appearance-none">
                {% for cat in categories %}
                    <option value="{{ cat.name }}">{{ cat.name }} (₱{{ cat.balance }})</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="block font-label-md text-on-surface-variant mb-1">Amount (₱)</label>
            <input type="number" name="amount" required step="0.01" min="0.01" class="w-full bg-surface border border-outline-variant rounded-lg p-3 focus:outline-none focus:border-primary transition-all text-xl font-numeric-display text-primary">
        </div>

        <div>
            <label class="block font-label-md text-on-surface-variant mb-1">Description</label>
            <input type="text" name="description" placeholder="What was this for?" class="w-full bg-surface border border-outline-variant rounded-lg p-3 focus:outline-none focus:border-primary transition-all">
        </div>

        <button type="submit" class="w-full bg-primary text-on-primary font-label-md py-3 rounded-lg font-bold hover:bg-primary-container transition-colors shadow-sm">
            Save Transaction
        </button>
    </form>
</div>
{% endblock %}
