{% extends "base.html" %}

{% block content %}
<div class="bg-white border border-outline-variant/30 rounded-2xl p-xl shadow-[0_8px_30px_rgba(0,0,0,0.08)] w-full max-w-lg mx-auto">
    <div class="flex flex-col items-center gap-4 mb-lg justify-center">
        <div class="w-16 h-16 rounded-2xl bg-primary/10 flex items-center justify-center text-primary shadow-sm border border-primary/5">
            <span class="material-symbols-outlined text-[36px]">person_add</span>
        </div>
        <h1 class="font-manrope text-3xl font-extrabold text-emerald-900 tracking-tight">Create Account</h1>
    </div>
    
    <h2 class="font-headline-sm text-center text-on-surface mb-lg">Join FinTrack</h2>
    
    <form action="/register" method="POST" class="space-y-4">
        <div>
            <label class="block font-label-md text-on-surface-variant mb-1">Full Name</label>
            <input type="text" name="full_name" required placeholder="John Doe" class="w-full bg-surface border border-outline-variant rounded-lg p-3 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all">
        </div>
        <div>
            <label class="block font-label-md text-on-surface-variant mb-1">Username</label>
            <input type="text" name="username" required placeholder="johndoe123" class="w-full bg-surface border border-outline-variant rounded-lg p-3 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all">
        </div>
        <div>
            <label class="block font-label-md text-on-surface-variant mb-1">Email Address</label>
            <input type="email" name="email" required placeholder="john@example.com" class="w-full bg-surface border border-outline-variant rounded-lg p-3 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all">
        </div>
        <div>
            <label class="block font-label-md text-on-surface-variant mb-1">4-Digit PIN</label>
            <input type="password" name="pin" required maxlength="4" pattern="\d{4}" placeholder="****" class="w-full bg-surface border border-outline-variant rounded-lg p-3 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all">
            <p class="text-xs text-on-surface-variant mt-1">This PIN will be used for authentication.</p>
        </div>
        <button type="submit" class="w-full bg-primary text-on-primary font-label-md py-3 rounded-lg font-bold hover:bg-primary-container transition-colors shadow-sm">
            Create Account
        </button>
    </form>
    
    <div class="mt-6 text-center">
        <p class="text-on-surface-variant font-body-md">
            Already have an account? 
            <a href="{{ url_for('login') }}" class="text-primary font-bold hover:underline ml-1">Log In</a>
        </p>
    </div>
</div>
{% endblock %}
